name: asset_tuner
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  decimal: ^3.2.4
  fl_chart: ^0.69.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_svg: ^2.0.16
  flutter_bloc: ^9.1.1
  freezed_annotation: ^3.1.0
  get_it: ^9.2.0
  go_router: ^17.0.1
  intl: ^0.20.2
  injectable: ^2.7.1+4
  json_annotation: ^4.9.0
  logger: ^2.6.2
  shared_preferences: ^2.3.3
  supabase_flutter: ^2.10.0
  pinput: ^3.0.0
  purchases_flutter: ^9.10.0
  purchases_ui_flutter: ^9.10.0
  url_launcher: ^6.3.2

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icon/icon.png
    - assets/icon/lang-en.svg
    - assets/icon/lang-ru.svg
    - assets/icon/google.svg
    - assets/icon/apple.svg

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"

dev_dependencies:
  build_runner: ^2.10.5
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  freezed: ^3.2.4
  injectable_generator: ^2.12.0
  json_serializable: ^6.11.4

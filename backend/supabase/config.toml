project_id = "asset_tuner"

[api]
enabled = true
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
major_version = 17

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[studio]
enabled = true

[functions]
  [functions.api]
  verify_jwt = true

  [functions.rates_sync]
  verify_jwt = false

  [functions.revenuecat_webhook]
  verify_jwt = false

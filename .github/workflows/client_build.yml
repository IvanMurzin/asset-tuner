name: client-build

on:
  workflow_dispatch:
    inputs:
      flavor:
        description: "Flavor"
        type: choice
        required: true
        default: dev
        options:
          - dev
          - prod
      mode:
        description: "Build mode"
        type: choice
        required: true
        default: release
        options:
          - debug
          - release
      format:
        description: "Output format (Android only)"
        type: choice
        required: true
        default: apk
        options:
          - apk
          - aab

jobs:
  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Materialize config
        env:
          CONFIG_DEV: ${{ secrets.CONFIG_DEV_JSON }}
          CONFIG_PROD: ${{ secrets.CONFIG_PROD_JSON }}
          FLAVOR: ${{ inputs.flavor }}
        run: |
          if [ "$FLAVOR" = "prod" ]; then
            printf '%s' "$CONFIG_PROD" > ../.config.prod.json
          else
            printf '%s' "$CONFIG_DEV" > ../.config.dev.json
          fi
          test -s ../.config.${FLAVOR}.json

      - name: Materialize release keystore (prod only)
        if: ${{ inputs.flavor == 'prod' && inputs.mode == 'release' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
        run: |
          mkdir -p android/keystores
          echo "$KEYSTORE_BASE64" | base64 -d > android/keystores/release.keystore
          cat > android/key.properties <<EOF
          storeFile=keystores/release.keystore
          storePassword=$STORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Pub get
        run: flutter pub get

      - name: Codegen
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons -f flutter_launcher_icons-${{ inputs.flavor }}.yaml

      - name: Build
        env:
          FLAVOR: ${{ inputs.flavor }}
          MODE: ${{ inputs.mode }}
          FORMAT: ${{ inputs.format }}
        run: |
          flutter build "$FORMAT" \
            --flavor "$FLAVOR" \
            --"$MODE" \
            --dart-define-from-file=../.config.${FLAVOR}.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: asset-tuner-${{ inputs.flavor }}-${{ inputs.mode }}-${{ inputs.format }}
          path: |
            client/build/app/outputs/flutter-apk/*.apk
            client/build/app/outputs/bundle/**/*.aab
          if-no-files-found: error
          retention-days: 7
